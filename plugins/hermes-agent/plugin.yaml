name: clawd-companion
version: 0.1.0
description: "Forward Hermes Agent lifecycle and tool-call events to the local Clawd Companion desktop event server."
author: "Clawd Companion contributors"
hooks:
  - pre_tool_call
  - post_tool_call
  - on_session_start
  - on_session_end
  - pre_approval_request
  - post_approval_response